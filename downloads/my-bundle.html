  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg: #0d0b0f;
      --bg2: #161318;
      --bg3: #1e1a22;
      --text: #faf6f0;
      --text-s: #b0a99e;
      --text-m: #8a7e70;
      --gold: #d4ae48;
      --gold-d: #b8922f;
      --pink: #ff2d7b;
      --pink-l: #ff5a9e;

    html { font-size: 16px; }
    body {
      font-family: var(--font-b);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--gold); text-decoration: none; transition: color .3s; }
    a:hover { color: var(--pink); }

    .container {
      width: 100%;
      max-width: 700px;
      padding: 3rem 1.5rem 4rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .header img {
      width: 100px; height: 100px; border-radius: 50%;

      filter: drop-shadow(0 0 20px rgba(255,45,123,.25));

    .header h1 {

    .header .thank-you {
      font-family: var(--font-d);
      font-style: italic; font-size: 1.15rem;
      color: var(--pink-l); margin-bottom: .25rem;
    }
    .header .sub {
      font-size: .85rem; color: var(--text-s);
    }

    .counter-bar {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .counter-bar .counter-text {
      font-family: var(--font-d);
      font-size: 1.1rem;
      color: var(--text);
    }
    .counter-bar .counter-text .num {
      color: var(--pink);
      font-weight: 700;
    }
    .counter-badge {
      font-size: .75rem;
      font-weight: 700;
      padding: .25rem .75rem;
      border-radius: 20px;
      letter-spacing: .05em;
    }
    .counter-badge.incomplete { background: rgba(255,45,123,.15); color: var(--pink-l); }
    .counter-badge.complete { background: rgba(74,222,128,.15); color: var(--green); }

    .song-list {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 2rem;
    }
    .song-list-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem; padding-bottom: .75rem;
      border-bottom: 1px solid var(--border);
    }
    .song-list-header h2 {
      font-family: var(--font-d);
      font-size: 1.1rem; color: var(--text); font-weight: 500;
    }
    .song-list-header .count {
      font-size: .8rem; color: var(--text-s);
      background: rgba(255,255,255,.06);
      padding: .2rem .6rem; border-radius: 20px;
    }

    .song-row {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .6rem 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
      transition: opacity .2s;
    }
    .song-row:last-child { border-bottom: none; }
    .song-row.locked {
      opacity: .35;
      pointer-events: none;
    }

    .song-row input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: var(--pink);
      cursor: pointer;
      flex-shrink: 0;
    }

    .song-row .song-title {
      flex: 1;
      font-size: .9rem;
      color: var(--text);
    }

    .song-row .dl-btn {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: .75rem;
      font-weight: 500;
      color: var(--bg);
      background: var(--gold);
      padding: .3rem .7rem;
      border-radius: 6px;
      transition: all .25s;
      white-space: nowrap;
    }
    .song-row .dl-btn:hover {
      background: var(--pink);
      color: #fff;
    }
    .song-row.selected .dl-btn {
      display: inline-flex;
    }

    .actions { text-align: center; }
    .actions a {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .9rem; font-weight: 500; color: var(--gold);
      border: 1px solid var(--border);
      padding: .6rem 1.5rem; border-radius: 8px; transition: all .25s;
    }
    .actions a:hover { border-color: var(--pink); color: var(--pink); }

    .footer-note {
      text-align: center; margin-top: 2rem;
      font-size: .75rem; color: var(--text-s); opacity: .6;
    }

    @media (max-width: 480px) {
      .container { padding: 2rem 1rem 3rem; }
      .header h1 { font-size: 1.35rem; }
    }
  </style>
</head>

    {t:"World Melts Away",p:"Album Collections/WORLD MELTS AWAY.mp3"},
    {t:"Zero Rips Left",p:"Album Collections/BEACH VIBES/zero-rips-left.mp3"}
  ];

  var params = new URLSearchParams(window.location.search);
  var tier = parseInt(params.get('tier')) || 3;
  var prices = {3:'$4.99', 5:'$6.99', 10:'$9.99'};

  document.getElementById('tierSub').textContent = tier + ' songs \u00B7 ' + (prices[tier] || '$4.99');
  document.getElementById('maxCount').textContent = tier;
  document.getElementById('totalSongs').textContent = allSongs.length + ' songs';

  var selected = 0;
  var body = document.getElementById('songListBody');

  function encPath(p) {
    return AUDIO_BASE + p.split('/').map(function(seg){ return encodeURIComponent(seg); }).join('/');
  }

  function updateCounter() {
    document.getElementById('selectedCount').textContent = selected;
    var badge = document.getElementById('counterBadge');
    if (selected >= tier) {
      badge.textContent = 'All picked!';
      badge.className = 'counter-badge complete';
    } else {
      badge.textContent = 'Pick ' + (tier - selected) + ' more';
      badge.className = 'counter-badge incomplete';
    }
    var rows = document.querySelectorAll('.song-row');
    for (var i = 0; i < rows.length; i++) {
      var cb = rows[i].querySelector('input');
      if (!cb.checked && selected >= tier) {
        rows[i].classList.add('locked');
      } else {
        rows[i].classList.remove('locked');
      }
    }
  }

  allSongs.forEach(function(song, i) {
    var url = encPath(song.p);
    var row = document.createElement('div');
    row.className = 'song-row';

    var cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.id = 'cb' + i;
    cb.addEventListener('change', function() {
      if (this.checked) { selected++; row.classList.add('selected'); }
      else { selected--; row.classList.remove('selected'); }
      updateCounter();
    });

    var title = document.createElement('span');
    title.className = 'song-title';
    title.textContent = song.t;

    var dl = document.createElement('a');
    dl.href = url;
    dl.setAttribute('download', '');
    dl.className = 'dl-btn';
    dl.textContent = DL_ICON + ' Download';

    row.appendChild(cb);
    row.appendChild(title);
    row.appendChild(dl);
    body.appendChild(row);
  });

  updateCounter();
})();
